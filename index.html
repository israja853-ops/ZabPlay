<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZabPlay: Golden Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* 👇 GOLDEN THEME DEFINITION 👇 */
        :root { --gold: #d4af37; --dark-gold: #8e6d13; --bg-gradient: linear-gradient(135deg, #1a1a1a 0%, #4a3b0a 100%); }

        * { margin: 0; padding: 0; box-sizing: border-box; touch-action: manipulation; }
        body { background: var(--bg-gradient); font-family: sans-serif; color: #fff; overflow-x: hidden; }
        
        .app-header { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; background: rgba(0,0,0,0.8); position: sticky; top: 0; z-index: 1000; border-bottom: 2px solid var(--gold); }
        .gold-text { color: var(--gold); text-shadow: 0 0 5px rgba(212, 175, 55, 0.5); }
        
        /* Video Grid */
        .video-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 15px 15px 100px; }
        .video-card { background: rgba(255,255,255,0.05); border-radius: 12px; overflow: hidden; border: 1px solid var(--dark-gold); cursor: pointer; transition: 0.3s; }
        .video-card.playing { border: 2px solid var(--gold); box-shadow: 0 0 15px var(--gold); transform: scale(1.02); }
        .thumb-box { width: 100%; aspect-ratio: 16/9; background: #000; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .thumb-box video { width: 100%; height: 100%; object-fit: cover; }
        .info { padding: 8px; background: rgba(0,0,0,0.5); }
        .name { font-size: 11px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: #fff; }

        /* PLAYER OVERLAY */
        #player-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-gradient); z-index: 2000; flex-direction: column; }
        
        .video-container { width: 100%; position: relative; background: #000; overflow: hidden; touch-action: none; }
        video#main-video { width: 100%; aspect-ratio: 16/9; display: block; transition: transform 0.1s ease-out; }

        /* Zoom Percentage Indicator */
        #zoom-tag { position: absolute; top: 60px; left: 50%; transform: translateX(-50%); background: rgba(212,175,55,0.8); color: #000; padding: 4px 12px; border-radius: 20px; font-weight: bold; font-size: 12px; display: none; z-index: 2210; }

        /* Overlay Controls (Auto-Hide) */
        .overlay-controls { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: space-between; background: rgba(0,0,0,0.4); opacity: 1; transition: opacity 0.5s; z-index: 2200; }
        .overlay-controls.hidden { opacity: 0; pointer-events: none; }

        .top-tools { display: flex; justify-content: flex-end; gap: 20px; padding: 15px; }
        .mid-btns { display: flex; justify-content: center; align-items: center; gap: 40px; flex: 1; }
        .bottom-seek { padding: 10px; }

        .tool-icon, .control-btn { color: #fff; cursor: pointer; text-shadow: 0 0 10px #000; }
        .control-btn { font-size: 35px; }
        .active-gold { color: var(--gold) !important; }

        .progress-area { width: 100%; height: 5px; background: rgba(255,255,255,0.3); border-radius: 5px; cursor: pointer; }
        .progress-bar { height: 100%; background: var(--gold); width: 0%; border-radius: 5px; }

        /* Scrollable List under Video */
        .up-next-list { flex: 1; overflow-y: auto; padding: 15px; }
        .next-video-item { display: flex; gap: 12px; margin-bottom: 12px; align-items: center; background: rgba(0,0,0,0.6); padding: 10px; border-radius: 12px; border: 1px solid var(--dark-gold); }
        .next-video-item.active-item { border: 1px solid var(--gold); background: rgba(212,175,55,0.1); }
        .next-thumb { width: 100px; height: 60px; background: #000; border-radius: 8px; overflow: hidden; flex-shrink: 0; }
        .next-thumb video { width: 100%; height: 100%; object-fit: cover; }
        
        .close-player { position: absolute; top: 10px; left: 15px; font-size: 24px; color: #fff; z-index: 2205; border: none; background: none; }

        #add-videos-btn { position: fixed; bottom: 85px; right: 20px; background: var(--gold); color: #000; width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 26px; border: 2px solid #fff; z-index: 1500; box-shadow: 0 4px 15px rgba(212,175,55,0.4); }
        
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: #000; display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid var(--gold); }
        .nav-item { color: #fff; text-align: center; font-size: 11px; opacity: 0.6; }
        .nav-item.active { color: var(--gold); opacity: 1; }
    </style>
</head>
<body>

    <header class="app-header">
        <div style="font-size: 20px; font-weight: bold;"><span class="gold-text">Z</span> ZabPlay</div>
        <i class="fas fa-search gold-text"></i>
    </header>

    <input type="file" id="file-input" multiple accept="video/*" style="display: none;">
    <button id="add-videos-btn"><i class="fas fa-plus"></i></button>

    <div class="video-grid" id="video-grid"></div>

    <div id="player-overlay">
        <button class="close-player" onclick="closePlayer()"><i class="fas fa-arrow-left"></i></button>
        
        <div class="video-container" id="v-cont" onclick="toggleControls()">
            <div id="zoom-tag">Zoom: 100%</div>
            <video id="main-video" playsinline></video>
            
            <div class="overlay-controls" id="controls">
                <div class="top-tools">
                    <i class="fas fa-sync-alt tool-icon" id="loop-btn" onclick="event.stopPropagation(); toggleLoop()"></i>
                    <i class="fas fa-headphones tool-icon" onclick="event.stopPropagation(); toggleAudioMode()"></i>
                    <i class="fas fa-expand tool-icon" onclick="event.stopPropagation(); rotateScreen()"></i>
                </div>
                <div class="mid-btns">
                    <i class="fas fa-step-backward control-btn" onclick="event.stopPropagation(); prevVideo()"></i>
                    <i class="fas fa-play control-btn" id="play-pause-btn" onclick="event.stopPropagation(); togglePlay()"></i>
                    <i class="fas fa-step-forward control-btn" onclick="event.stopPropagation(); nextVideo()"></i>
                </div>
                <div class="bottom-seek">
                    <div class="progress-area" onclick="event.stopPropagation(); seekVideo(event)">
                        <div class="progress-bar" id="p-bar"></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="up-next-list">
            <p style="font-size: 14px; margin-bottom: 12px; color: var(--gold);">Playlist</p>
            <div id="queue-list"></div>
        </div>
    </div>

    <nav class="bottom-nav">
        <div class="nav-item active"><i class="fas fa-video" style="font-size: 20px; display: block;"></i>Video</div>
        <div class="nav-item"><i class="fas fa-music" style="font-size: 20px; display: block;"></i>Music</div>
        <div class="nav-item"><i class="fas fa-folder" style="font-size: 20px; display: block;"></i>Files</div>
    </nav>

    <script>
        let videoList = [];
        let currentIndex = 0;
        let hideTimeout;
        let currentZoom = 1;

        // Add Videos & Thumbnails
        document.getElementById('add-videos-btn').onclick = () => document.getElementById('file-input').click();
        document.getElementById('file-input').onchange = (e) => {
            const files = Array.from(e.target.files);
            files.forEach(file => {
                const url = URL.createObjectURL(file);
                videoList.push({ name: file.name, url: url });
                renderGrid();
            });
        };

        function renderGrid() {
            const grid = document.getElementById('video-grid');
            grid.innerHTML = videoList.map((v, i) => `
                <div class="video-card ${i === currentIndex && document.getElementById('player-overlay').style.display === 'flex' ? 'playing' : ''}" onclick="playVideo(${i})">
                    <div class="thumb-box"><video src="${v.url}#t=1"></video></div>
                    <div class="info"><p class="name">${v.name}</p></div>
                </div>
            `).join('');
        }

        function playVideo(index) {
            currentIndex = index;
            const video = document.getElementById('main-video');
            video.src = videoList[currentIndex].url;
            document.getElementById('player-overlay').style.display = 'flex';
            video.play();
            resetZoom();
            showControls();
            updateQueue();
            renderGrid();
        }

        // 👇 AUTO-HIDE CONTROLS LOGIC 👇
        function toggleControls() {
            const ctrl = document.getElementById('controls');
            if (ctrl.classList.contains('hidden')) showControls();
            else hideControls();
        }

        function showControls() {
            const ctrl = document.getElementById('controls');
            ctrl.classList.remove('hidden');
            clearTimeout(hideTimeout);
            hideTimeout = setTimeout(hideControls, 3000); // 3 seconds hide
        }

        function hideControls() {
            document.getElementById('controls').classList.add('hidden');
        }

        // 👇 ZOOM LOGIC 👇
        const vCont = document.getElementById('v-cont');
        const videoElem = document.getElementById('main-video');
        const zoomTag = document.getElementById('zoom-tag');

        vCont.addEventListener('wheel', (e) => {
            e.preventDefault();
            currentZoom += e.deltaY * -0.001;
            currentZoom = Math.min(Math.max(1, currentZoom), 4);
            applyZoom();
        });

        function applyZoom() {
            videoElem.style.transform = `scale(${currentZoom})`;
            zoomTag.style.display = 'block';
            zoomTag.innerText = `Zoom: ${Math.round(currentZoom * 100)}%`;
            setTimeout(() => { if(currentZoom === 1) zoomTag.style.display = 'none'; }, 2000);
        }

        function resetZoom() { currentZoom = 1; applyZoom(); zoomTag.style.display = 'none'; }

        // Standard Controls
        function togglePlay() {
            const v = document.getElementById('main-video');
            if (v.paused) { v.play(); document.getElementById('play-pause-btn').className = 'fas fa-pause control-btn'; }
            else { v.pause(); document.getElementById('play-pause-btn').className = 'fas fa-play control-btn'; }
            showControls();
        }

        document.getElementById('main-video').ontimeupdate = function() {
            const pct = (this.currentTime / this.duration) * 100;
            document.getElementById('p-bar').style.width = pct + '%';
        };

        function seekVideo(e) {
            const rect = e.currentTarget.getBoundingClientRect();
            const pos = (e.clientX - rect.left) / rect.width;
            document.getElementById('main-video').currentTime = pos * document.getElementById('main-video').duration;
        }

        function nextVideo() { if (currentIndex < videoList.length - 1) playVideo(currentIndex + 1); }
        function prevVideo() { if (currentIndex > 0) playVideo(currentIndex - 1); }
        function closePlayer() { document.getElementById('main-video').pause(); document.getElementById('player-overlay').style.display = 'none'; renderGrid(); }

        function updateQueue() {
            const qList = document.getElementById('queue-list');
            qList.innerHTML = videoList.map((v, i) => `
                <div class="next-video-item ${i === currentIndex ? 'active-item' : ''}" onclick="playVideo(${i})">
                    <div class="next-thumb"><video src="${v.url}#t=1"></video></div>
                    <p style="font-size:12px; flex:1;">${i === currentIndex ? '<b>Now Playing:</b> ' : ''}${v.name}</p>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
