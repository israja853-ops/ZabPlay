<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZPlayer Splash Screen</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="splash-screen">
        <div class="logo-container">
            <img src="logo.png" alt="ZPlayer Logo" class="app-logo">
        </div>
    </div>

    <div id="main-content" style="display: none;">
        <h1>App main content yahan banega</h1>
    </div>

    <script>
        // DOM load hone ke baad...
        document.addEventListener('DOMContentLoaded', () => {
            // Is function ko tab chalana hai jab screen switch karni ho
            function showMainApp() {
                const splash = document.getElementById('splash-screen');
                const main = document.getElementById('main-content');
                
                // Fade out animation start karein
                splash.classList.add('fade-out');

                // Kuch der baad (0.6 seconds in CSS) splash screen ko destroy kar dein aur main content dikhayein
                setTimeout(() => {
                    splash.style.display = 'none';
                    main.style.display = 'block';
                }, 600); // Animation time ke saath sync rahe
            }

            // Splash screen ko minimum 2.5 seconds dikhayien tab tak ke liye yeh delay hai
            setTimeout(showMainApp, 2500); 
        });
    </script>
</body>
</html>
