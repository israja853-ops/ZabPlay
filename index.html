<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZabPlay: Pro Media</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* Modern Teal UI */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: #000; font-family: sans-serif; color: #fff; overflow-x: hidden; }
        
        .app-header { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; background: #000; position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid rgba(29, 233, 182, 0.2); }
        .teal-text { color: #1de9b6; }
        
        /* Video Grid */
        .video-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 15px 15px 100px; }
        .video-card { background: #0a0a0a; border-radius: 12px; overflow: hidden; border: 1px solid #1a1a1a; cursor: pointer; }
        .thumb-box { width: 100%; aspect-ratio: 16/9; background: #111; display: flex; align-items: center; justify-content: center; position: relative; }
        .info { padding: 10px; }
        .name { font-size: 11px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: #eee; }

        /* 👇 PLAYER OVERLAY (Teal Background Connected) 👇 */
        #player-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(180deg, #000 0%, #0d2b24 100%); z-index: 2000; flex-direction: column; }
        
        .video-container { width: 100%; position: sticky; top: 0; background: #000; z-index: 2100; position: relative; }
        video { width: 100%; aspect-ratio: 16/9; display: block; }

        /* Top Controls (Audio & Rotation) */
        .top-player-tools { position: absolute; top: 10px; width: 100%; display: flex; justify-content: flex-end; gap: 20px; padding: 0 50px 0 20px; z-index: 2201; }
        .tool-icon { font-size: 20px; color: #fff; cursor: pointer; }

        /* Custom Controls */
        .custom-controls { padding: 15px; background: rgba(0,0,0,0.8); display: flex; flex-direction: column; gap: 12px; }
        .progress-area { width: 100%; height: 6px; background: #333; border-radius: 3px; position: relative; cursor: pointer; }
        .progress-bar { height: 100%; background: #1de9b6; width: 0%; border-radius: 3px; pointer-events: none; }
        
        .buttons { display: flex; justify-content: center; align-items: center; gap: 35px; font-size: 26px; padding: 5px 0; }
        .control-btn { color: #fff; cursor: pointer; transition: 0.2s; }
        .control-btn:active { color: #1de9b6; transform: scale(0.9); }

        /* Scrollable List under Video */
        .up-next-list { flex: 1; overflow-y: auto; padding: 15px; }
        .next-video-item { display: flex; gap: 12px; margin-bottom: 15px; align-items: center; background: rgba(255,255,255,0.05); padding: 8px; border-radius: 10px; }
        .next-thumb { width: 100px; height: 60px; background: #111; border-radius: 6px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
        
        .close-player { position: absolute; top: 10px; right: 15px; font-size: 22px; color: #fff; z-index: 2200; border: none; background: none; }

        #add-videos-btn { position: fixed; bottom: 85px; right: 20px; background: #1de9b6; color: #000; width: 55px; height: 55px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; border: none; box-shadow: 0 4px 15px rgba(29,233,182,0.4); z-index: 1500; }
        
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: #050505; display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid #1a1a1a; }
        .nav-item { color: #555; text-decoration: none; text-align: center; font-size: 10px; }
        .nav-item.active { color: #1de9b6; }
    </style>
</head>
<body>

    <header class="app-header">
        <div style="font-size: 20px; font-weight: bold;"><span class="teal-text">Z</span> ZabPlay</div>
        <i class="fas fa-search teal-text"></i>
    </header>

    <input type="file" id="file-input" multiple accept="video/*" style="display: none;">
    <button id="add-videos-btn"><i class="fas fa-plus"></i></button>

    <div class="video-grid" id="video-grid"></div>

    <div id="player-overlay">
        <button class="close-player" onclick="closePlayer()"><i class="fas fa-chevron-down"></i></button>
        
        <div class="video-container" id="v-cont" ondblclick="handleDoubleTap(event)">
            <div class="top-player-tools">
                <i class="fas fa-headphones tool-icon" onclick="toggleAudioMode()" title="Audio Only"></i>
                <i class="fas fa-redo tool-icon" onclick="rotateScreen()" title="Rotate Screen"></i>
            </div>

            <video id="main-video"></video>
            
            <div class="custom-controls">
                <div class="progress-area" id="p-area" onclick="seekVideo(event)">
                    <div class="progress-bar" id="p-bar"></div>
                </div>
                <div class="buttons">
                    <i class="fas fa-step-backward control-btn" onclick="prevVideo()"></i>
                    <i class="fas fa-play control-btn" id="play-pause-btn" onclick="togglePlay()"></i>
                    <i class="fas fa-step-forward control-btn" onclick="nextVideo()"></i>
                </div>
            </div>
        </div>

        <div class="up-next-list">
            <p style="font-size: 14px; margin-bottom: 15px; color: #1de9b6;">Up Next</p>
            <div id="queue-list"></div>
        </div>
    </div>

    <nav class="bottom-nav">
        <div class="nav-item active"><i class="fas fa-video" style="font-size: 22px; display: block; margin-bottom: 4px;"></i>Video</div>
        <div class="nav-item"><i class="fas fa-music" style="font-size: 22px; display: block; margin-bottom: 4px;"></i>Music</div>
        <div class="nav-item"><i class="fas fa-folder" style="font-size: 22px; display: block; margin-bottom: 4px;"></i>Files</div>
    </nav>

    <script>
        const fileInput = document.getElementById('file-input');
        const grid = document.getElementById('video-grid');
        const playerOverlay = document.getElementById('player-overlay');
        const videoPlayer = document.getElementById('main-video');
        const playPauseBtn = document.getElementById('play-pause-btn');
        const progressBar = document.getElementById('p-bar');
        const progressArea = document.getElementById('p-area');
        
        let videoList = [];
        let currentIndex = 0;
        let isRotated = false;

        document.getElementById('add-videos-btn').onclick = () => fileInput.click();

        fileInput.onchange = (e) => {
            const files = Array.from(e.target.files);
            files.forEach((file) => {
                const url = URL.createObjectURL(file);
                videoList.push({ name: file.name, url: url });
                
                const card = document.createElement('div');
                card.className = 'video-card';
                card.onclick = () => playVideo(videoList.length - 1);
                card.innerHTML = `<div class="thumb-box"><i class="fas fa-play teal-text"></i></div><div class="info"><p class="name">${file.name}</p></div>`;
                grid.appendChild(card);
            });
        };

        function playVideo(index) {
            currentIndex = index;
            videoPlayer.src = videoList[currentIndex].url;
            playerOverlay.style.display = 'flex';
            videoPlayer.play();
            playPauseBtn.className = 'fas fa-pause control-btn';
            updateQueue();
        }

        function togglePlay() {
            if (videoPlayer.paused) {
                videoPlayer.play();
                playPauseBtn.className = 'fas fa-pause control-btn';
            } else {
                videoPlayer.pause();
                playPauseBtn.className = 'fas fa-play control-btn';
            }
        }

        // 1. Double Tap to Seek (10s)
        function handleDoubleTap(e) {
            const rect = e.currentTarget.getBoundingClientRect();
            const x = e.clientX - rect.left;
            if (x > rect.width / 2) {
                videoPlayer.currentTime += 10; // Right side: +10s
            } else {
                videoPlayer.currentTime -= 10; // Left side: -10s
            }
        }

        // 2. Rotate Screen Logic
        function rotateScreen() {
            if(!isRotated) {
                document.getElementById('v-cont').style.transform = "rotate(90deg) translateY(-100%)";
                document.getElementById('v-cont').style.transformOrigin = "top left";
                document.getElementById('v-cont').style.width = "100vh";
                document.getElementById('v-cont').style.height = "100vw";
                isRotated = true;
            } else {
                document.getElementById('v-cont').style.transform = "none";
                document.getElementById('v-cont').style.width = "100%";
                document.getElementById('v-cont').style.height = "auto";
                isRotated = false;
            }
        }

        // 3. Audio Only Mode (Background Play Style)
        function toggleAudioMode() {
            if(videoPlayer.style.opacity !== "0") {
                videoPlayer.style.opacity = "0";
                alert("Audio Mode Active");
            } else {
                videoPlayer.style.opacity = "1";
            }
        }

        // 4. Seek on Progress Bar Click
        function seekVideo(e) {
            const rect = progressArea.getBoundingClientRect();
            const pos = (e.clientX - rect.left) / rect.width;
            videoPlayer.currentTime = pos * videoPlayer.duration;
        }

        videoPlayer.ontimeupdate = () => {
            const pct = (videoPlayer.currentTime / videoPlayer.duration) * 100;
            progressBar.style.width = pct + '%';
        };

        function nextVideo() { if (currentIndex < videoList.length - 1) playVideo(currentIndex + 1); }
        function prevVideo() { if (currentIndex > 0) playVideo(currentIndex - 1); }
        function closePlayer() { videoPlayer.pause(); playerOverlay.style.display = 'none'; }

        function updateQueue() {
            const qList = document.getElementById('queue-list');
            qList.innerHTML = '';
            videoList.forEach((v, i) => {
                if(i === currentIndex) return;
                const item = document.createElement('div');
                item.className = 'next-video-item';
                item.onclick = () => playVideo(i);
                item.innerHTML = `<div class="next-thumb"><i class="fas fa-play" style="color:#333"></i></div><p style="font-size:12px;">${v.name}</p>`;
                qList.appendChild(item);
            });
        }
    </script>
</body>
</html>
