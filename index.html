<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZabPlay Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: #000; font-family: 'Segoe UI', sans-serif; color: #fff; overflow-x: hidden; }
        
        /* Header & Search */
        .app-header { padding: 15px 20px; background: #000; position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid #111; }
        .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .teal-text { color: #1de9b6; font-weight: bold; }
        
        .search-container { display: flex; background: #111; border-radius: 8px; padding: 8px 12px; align-items: center; border: 1px solid #222; }
        .search-container input { background: none; border: none; color: #fff; width: 100%; margin-left: 10px; outline: none; font-size: 14px; }

        /* Stats & Title */
        .content-info { padding: 15px 15px 5px; display: flex; justify-content: space-between; align-items: center; }
        .video-count { font-size: 12px; color: #1de9b6; background: rgba(29,233,182,0.1); padding: 2px 8px; border-radius: 4px; }

        /* Grid System */
        .video-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 10px 15px 100px; }
        .video-card { background: #0a0a0a; border-radius: 10px; overflow: hidden; border: 1px solid #1a1a1a; transition: 0.3s; }
        .thumb-placeholder { width: 100%; aspect-ratio: 16/9; background: #111; display: flex; align-items: center; justify-content: center; position: relative; }
        .video-card .name { padding: 8px; font-size: 11px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: #ccc; }

        /* Bottom Navigation */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: #050505; display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid #1a1a1a; z-index: 1000; }
        .nav-item { color: #555; text-decoration: none; text-align: center; font-size: 10px; cursor: pointer; }
        .nav-item i { font-size: 20px; display: block; margin-bottom: 3px; }
        .nav-item.active { color: #1de9b6; }

        /* Floating Add Button */
        #add-btn { position: fixed; bottom: 80px; right: 20px; background: #1de9b6; color: #000; width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; border: none; box-shadow: 0 4px 10px rgba(29,233,182,0.3); z-index: 999; }
        
        /* Pages */
        .page { display: none; }
        .page.active { display: block; }
        .empty-msg { text-align: center; color: #444; margin-top: 50px; padding: 20px; }
    </style>
</head>
<body>

    <header class="app-header">
        <div class="header-top">
            <div style="font-size: 18px;"><span class="teal-text">Z</span> ZabPlay</div>
            <i class="fas fa-ellipsis-v" style="color: #666;"></i>
        </div>
        <div class="search-container">
            <i class="fas fa-search" style="color: #1de9b6;"></i>
            <input type="text" id="searchInput" placeholder="Search videos in gallery..." onkeyup="filterVideos()">
        </div>
    </header>

    <div id="video-page" class="page active">
        <div class="content-info">
            <span style="font-size: 14px; font-weight: bold;">All Videos</span>
            <span id="count-tag" class="video-count">0 Videos</span>
        </div>
        <div class="video-grid" id="video-grid">
            <div class="empty-msg" id="msg">No videos found. Tap + to add from gallery.</div>
        </div>
    </div>

    <div id="music-page" class="page"><div class="empty-msg">Music Library Coming Soon</div></div>
    <div id="files-page" class="page"><div class="empty-msg">File Explorer Coming Soon</div></div>

    <input type="file" id="file-input" multiple accept="video/*" style="display: none;">
    <button id="add-btn"><i class="fas fa-plus"></i></button>

    <nav class="bottom-nav">
        <div class="nav-item active" onclick="switchPage('video', this)"><i class="fas fa-video"></i>Video</div>
        <div class="nav-item" onclick="switchPage('music', this)"><i class="fas fa-music"></i>Music</div>
        <div class="nav-item" onclick="switchPage('files', this)"><i class="fas fa-folder"></i>Files</div>
    </nav>

    <script>
        let allVideos = [];

        // Add Videos Function
        document.getElementById('add-btn').onclick = () => document.getElementById('file-input').click();

        document.getElementById('file-input').onchange = (e) => {
            const files = Array.from(e.target.files);
            document.getElementById('msg').style.display = 'none';
            
            files.forEach(file => {
                const videoObj = { name: file.name, url: URL.createObjectURL(file) };
                allVideos.push(videoObj);
            });
            renderVideos(allVideos);
        };

        function renderVideos(data) {
            const grid = document.getElementById('video-grid');
            const countTag = document.getElementById('count-tag');
            
            grid.innerHTML = data.map(v => `
                <div class="video-card">
                    <div class="thumb-placeholder">
                        <i class="fas fa-play" style="color: #1de9b6; opacity: 0.5;"></i>
                    </div>
                    <p class="name">${v.name}</p>
                </div>
            `).join('');
            
            countTag.innerText = `${data.length} Videos`;
        }

        // Real Working Search
        function filterVideos() {
            const term = document.getElementById('searchInput').value.toLowerCase();
            const filtered = allVideos.filter(v => v.name.toLowerCase().includes(term));
            renderVideos(filtered);
        }

        // Bottom Nav Fix
        function switchPage(pageId, element) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            
            document.getElementById(pageId + '-page').classList.add('active');
            element.classList.add('active');
        }
    </script>
</body>
</html>
