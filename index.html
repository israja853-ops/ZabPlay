<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZebPlay - Professional Video Player</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="app-header">
        <h1 class="logo">Zeb<span>Play</span></h1>
        <div class="header-icons">
            <i class="fas fa-search" id="search-trigger"></i>
            <i class="fas fa-cog" id="settings-trigger"></i>
        </div>
    </header>

    <main class="content-scroll">
        <section class="section-container">
            <div class="section-header">
                <h2>History</h2>
                <span class="more-btn">More</span>
            </div>
            <div class="horizontal-scroll" id="history-list">
                </div>
        </section>

        <section class="section-container">
            <div class="section-header">
                <h2>Shorts</h2>
            </div>
            <div class="horizontal-scroll" id="shorts-list">
                </div>
        </section>

        <section class="section-container">
            <div class="section-header">
                <h2>All Video</h2>
            </div>
            <div class="vertical-list" id="all-videos-list">
                </div>
        </section>
    </main>

    <nav class="bottom-nav">
        <div class="nav-item active" data-tab="videos">
            <i class="fas fa-play-circle"></i>
            <span>Videos</span>
        </div>
        <div class="nav-item" data-tab="music">
            <i class="fas fa-music"></i>
            <span>Music</span>
        </div>
        <div class="nav-item" data-tab="files">
            <i class="fas fa-folder"></i>
            <span>Files</span>
        </div>
        <div class="nav-item" data-tab="photos">
            <i class="fas fa-image"></i>
            <span>Photos</span>
        </div>
    </nav>

    <input type="file" id="video-scanner" multiple accept="video/*" style="display: none;">

    <script src="script.js"></script>
</body>
</html>
