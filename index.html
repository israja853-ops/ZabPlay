<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZabPlay: Pro Media</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: #000; font-family: sans-serif; color: #fff; overflow-x: hidden; }
        
        .app-header { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; background: #000; position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid #1de9b6; }
        .teal-text { color: #1de9b6; }
        
        /* Video Grid */
        .video-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 15px 15px 100px; }
        .video-card { background: #111; border-radius: 12px; overflow: hidden; border: 1px solid #1de9b6; cursor: pointer; }
        .thumb-box { width: 100%; aspect-ratio: 16/9; background: #000; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .thumb-box video { width: 100%; height: 100%; object-fit: cover; pointer-events: none; }
        .info { padding: 10px; background: #000; }
        .name { font-size: 11px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: #1de9b6; }

        /* PLAYER OVERLAY (Solid Teal Background) */
        #player-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #1de9b6; z-index: 2000; flex-direction: column; }
        
        .video-container { width: 100%; position: relative; background: #000; overflow: hidden; }
        video#main-video { width: 100%; aspect-ratio: 16/9; display: block; }

        /* Controls INSIDE Video (Overlay) */
        .overlay-controls { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: space-between; background: rgba(0,0,0,0.3); opacity: 0; transition: 0.3s; }
        .video-container:hover .overlay-controls, .video-container:active .overlay-controls { opacity: 1; }

        .top-tools { display: flex; justify-content: flex-end; gap: 20px; padding: 15px; }
        .mid-btns { display: flex; justify-content: center; align-items: center; gap: 40px; flex: 1; }
        .bottom-seek { padding: 10px; }

        .tool-icon, .control-btn { color: #fff; cursor: pointer; text-shadow: 0 0 10px #000; }
        .tool-icon { font-size: 20px; }
        .control-btn { font-size: 30px; }
        .active-loop { color: #1de9b6 !important; }

        .progress-area { width: 100%; height: 5px; background: rgba(255,255,255,0.3); border-radius: 5px; cursor: pointer; }
        .progress-bar { height: 100%; background: #1de9b6; width: 0%; border-radius: 5px; }

        /* Scrollable List under Video */
        .up-next-list { flex: 1; overflow-y: auto; padding: 15px; background: #1de9b6; }
        .next-video-item { display: flex; gap: 12px; margin-bottom: 12px; align-items: center; background: rgba(0,0,0,0.8); padding: 10px; border-radius: 12px; border: 1px solid #fff; }
        .next-thumb { width: 110px; height: 65px; background: #000; border-radius: 8px; flex-shrink: 0; overflow: hidden; }
        .next-thumb video { width: 100%; height: 100%; object-fit: cover; }
        
        .close-player { position: absolute; top: 10px; left: 15px; font-size: 24px; color: #fff; z-index: 2205; border: none; background: none; }

        #add-videos-btn { position: fixed; bottom: 85px; right: 20px; background: #1de9b6; color: #000; width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 26px; border: 2px solid #000; z-index: 1500; }
        
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: #000; display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid #1de9b6; }
        .nav-item { color: #fff; text-align: center; font-size: 11px; opacity: 0.6; }
        .nav-item.active { color: #1de9b6; opacity: 1; }
    </style>
</head>
<body>

    <header class="app-header">
        <div style="font-size: 20px; font-weight: bold;"><span class="teal-text">Z</span> ZabPlay</div>
        <i class="fas fa-search teal-text"></i>
    </header>

    <input type="file" id="file-input" multiple accept="video/*" style="display: none;">
    <button id="add-videos-btn"><i class="fas fa-plus"></i></button>

    <div class="video-grid" id="video-grid"></div>

    <div id="player-overlay">
        <button class="close-player" onclick="closePlayer()"><i class="fas fa-times"></i></button>
        
        <div class="video-container" id="v-cont" ondblclick="handleDoubleTap(event)">
            <video id="main-video" playsinline></video>
            
            <div class="overlay-controls">
                <div class="top-tools">
                    <i class="fas fa-sync-alt tool-icon" id="loop-btn" onclick="toggleLoop()" title="Repeat"></i>
                    <i class="fas fa-headphones tool-icon" onclick="toggleAudioMode()"></i>
                    <i class="fas fa-redo tool-icon" onclick="rotateScreen()"></i>
                </div>

                <div class="mid-btns">
                    <i class="fas fa-step-backward control-btn" onclick="prevVideo()"></i>
                    <i class="fas fa-play control-btn" id="play-pause-btn" onclick="togglePlay()"></i>
                    <i class="fas fa-step-forward control-btn" onclick="nextVideo()"></i>
                </div>

                <div class="bottom-seek">
                    <div class="progress-area" id="p-area" onclick="seekVideo(event)">
                        <div class="progress-bar" id="p-bar"></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="up-next-list">
            <p style="font-size: 16px; font-weight: bold; margin-bottom: 15px; color: #000;">Up Next</p>
            <div id="queue-list"></div>
        </div>
    </div>

    <nav class="bottom-nav">
        <div class="nav-item active"><i class="fas fa-video" style="font-size: 20px; display: block;"></i>Video</div>
        <div class="nav-item"><i class="fas fa-music" style="font-size: 20px; display: block;"></i>Music</div>
        <div class="nav-item"><i class="fas fa-folder" style="font-size: 20px; display: block;"></i>Files</div>
    </nav>

    <script>
        const fileInput = document.getElementById('file-input');
        const grid = document.getElementById('video-grid');
        const playerOverlay = document.getElementById('player-overlay');
        const videoPlayer = document.getElementById('main-video');
        const playPauseBtn = document.getElementById('play-pause-btn');
        const progressBar = document.getElementById('p-bar');
        const progressArea = document.getElementById('p-area');
        
        let videoList = [];
        let currentIndex = 0;
        let isRotated = false;

        document.getElementById('add-videos-btn').onclick = () => fileInput.click();

        fileInput.onchange = (e) => {
            const files = Array.from(e.target.files);
            files.forEach((file) => {
                const url = URL.createObjectURL(file);
                videoList.push({ name: file.name, url: url });
                
                const card = document.createElement('div');
                card.className = 'video-card';
                card.onclick = () => playVideo(videoList.length - 1);
                card.innerHTML = `
                    <div class="thumb-box">
                        <video src="${url}#t=1"></video>
                    </div>
                    <div class="info"><p class="name">${file.name}</p></div>
                `;
                grid.appendChild(card);
            });
        };

        function playVideo(index) {
            currentIndex = index;
            videoPlayer.src = videoList[currentIndex].url;
            playerOverlay.style.display = 'flex';
            videoPlayer.play();
            playPauseBtn.className = 'fas fa-pause control-btn';
            updateQueue();
        }

        function togglePlay() {
            if (videoPlayer.paused) {
                videoPlayer.play();
                playPauseBtn.className = 'fas fa-pause control-btn';
            } else {
                videoPlayer.pause();
                playPauseBtn.className = 'fas fa-play control-btn';
            }
        }

        function toggleLoop() {
            videoPlayer.loop = !videoPlayer.loop;
            document.getElementById('loop-btn').classList.toggle('active-loop');
        }

        function handleDoubleTap(e) {
            const rect = e.currentTarget.getBoundingClientRect();
            const x = e.clientX - rect.left;
            if (x > rect.width / 2) videoPlayer.currentTime += 10;
            else videoPlayer.currentTime -= 10;
        }

        function rotateScreen() {
            if(!isRotated) {
                document.getElementById('v-cont').style.transform = "rotate(90deg) translateY(-100%)";
                document.getElementById('v-cont').style.transformOrigin = "top left";
                document.getElementById('v-cont').style.width = "100vh";
                document.getElementById('v-cont').style.height = "100vw";
                isRotated = true;
            } else {
                document.getElementById('v-cont').style.transform = "none";
                document.getElementById('v-cont').style.width = "100%";
                document.getElementById('v-cont').style.height = "auto";
                isRotated = false;
            }
        }

        function toggleAudioMode() {
            videoPlayer.style.opacity = (videoPlayer.style.opacity === "0") ? "1" : "0";
        }

        function seekVideo(e) {
            const rect = progressArea.getBoundingClientRect();
            const pos = (e.clientX - rect.left) / rect.width;
            videoPlayer.currentTime = pos * videoPlayer.duration;
        }

        videoPlayer.ontimeupdate = () => {
            const pct = (videoPlayer.currentTime / videoPlayer.duration) * 100;
            progressBar.style.width = pct + '%';
        };

        function nextVideo() { if (currentIndex < videoList.length - 1) playVideo(currentIndex + 1); }
        function prevVideo() { if (currentIndex > 0) playVideo(currentIndex - 1); }
        function closePlayer() { videoPlayer.pause(); playerOverlay.style.display = 'none'; }

        function updateQueue() {
            const qList = document.getElementById('queue-list');
            qList.innerHTML = '';
            videoList.forEach((v, i) => {
                if(i === currentIndex) return;
                const item = document.createElement('div');
                item.className = 'next-video-item';
                item.onclick = () => playVideo(i);
                item.innerHTML = `
                    <div class="next-thumb"><video src="${v.url}#t=1"></video></div>
                    <p style="font-size:13px; color:#fff; flex:1;">${v.name}</p>
                    <i class="fas fa-play" style="color:#1de9b6; margin-right:10px;"></i>
                `;
                qList.appendChild(item);
            });
        }
    </script>
</body>
</html>
