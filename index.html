<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZebPlay - Professional Video Player</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="app-header">
        <h1 class="logo">Zeb<span>Play</span></h1>
        <div class="header-icons">
            <div class="icon-circle"><i class="fas fa-search" id="search-trigger"></i></div>
            <div class="icon-circle purple-glow"><i class="fas fa-cog" id="settings-trigger"></i></div>
        </div>
    </header>

    <main class="content-scroll">
        <section class="section-container">
            <div class="section-header">
                <h2>History</h2>
                <span class="more-btn">More</span>
            </div>
            <div class="horizontal-scroll" id="history-list"></div>
        </section>

        <section class="section-container">
            <div class="section-header">
                <h2>Shorts</h2>
            </div>
            <div class="horizontal-scroll" id="shorts-list"></div>
        </section>

        <section class="section-container">
            <div class="section-header">
                <h2>All Video</h2>
            </div>
            <div class="vertical-list" id="all-videos-list"></div>
        </section>
    </main>

    <nav class="bottom-nav">
        <div class="nav-item active" data-tab="videos">
            <i class="fas fa-play-circle"></i>
            <span>Videos</span>
        </div>
        <div class="nav-item" data-tab="music">
            <i class="fas fa-music"></i>
            <span>Music</span>
        </div>
        <div class="nav-item" data-tab="files">
            <i class="fas fa-folder"></i>
            <span>Files</span>
        </div>
        <div class="nav-item" data-tab="photos">
            <i class="fas fa-image"></i>
            <span>Photos</span>
        </div>
    </nav>

    <input type="file" id="video-scanner" multiple accept="video/*" style="display: none;">

    <div id="player-overlay">
        
        <div class="video-main-container" id="video-box">
            <video id="main-video-engine" playsinline onclick="handleScreenTap()"></video>
            
            <div class="player-ui-wrapper" id="full-player-controls">
                <div class="player-header" id="top-controls">
                    <i class="fas fa-arrow-left" onclick="closePlayer()"></i>
                    <div class="header-right">
                        <i class="fas fa-lock-open" id="lock-btn"></i>
                        <i class="fas fa-volume-up" id="vol-btn" onclick="toggleMute()"></i>
                        <i class="fas fa-sliders-h" id="eq-btn" onclick="openEqualizer()"></i>
                        <i class="fas fa-headphones" id="audio-btn" onclick="convertToMp3()"></i>
                        <i class="fas fa-cog" id="vid-settings" onclick="toggleSettingsMenu()"></i>
                    </div>
                </div>

                <div class="player-controls" id="player-ui">
                    <div class="mid-btns">
                        <i class="fas fa-step-backward" id="prev-btn" onclick="prevVideo()"></i>
                        <div class="play-circle-main">
                            <i class="fas fa-play" id="master-play"></i>
                        </div>
                        <i class="fas fa-step-forward" id="next-btn" onclick="nextVideo()"></i>
                    </div>
                    
                    <div class="bottom-controls">
                        <div class="time-info">
                            <span id="curr-time">00:00</span>
                            <div class="seek-bar" id="seek-container">
                                <div id="seek-fill"><div class="seek-handle"></div></div>
                            </div>
                            <span id="total-time">00:00</span>
                        </div>
                        <div class="extra-tools">
                            <span id="speed-btn" onclick="changeSpeed()">1. X</span>
                            <i class="fas fa-expand" id="full-screen-btn"></i>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="player-details-area">
            <div class="video-title-bar">
                <h2 id="playing-v-title">Video - Titel</h2>
                <i class="fas fa-ellipsis-v" onclick="toggleTitleMenu()"></i>
            </div>
            
            <div class="player-section">
                <h3>Short</h3>
                <div class="horizontal-scroll" id="player-shorts-list"></div>
            </div>

            <div class="player-section">
                <h3>Next.UP</h3>
                <div id="up-next-list" class="glass-list"></div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
